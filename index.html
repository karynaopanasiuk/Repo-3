<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karyna Opanasiuk — Designer</title>
    <!-- Tailwind CSS підключається через CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <!--
    bg-gray-100  → сірий фон сторінки
    min-h-screen → займає всю висоту екрану
    flex items-center justify-center → центрує картку по середині
    p-4          → відступи на мобільному
  -->
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- КАРТКА -->
    <!--
      bg-white     → білий фон картки
      rounded-2xl  → заокруглені кути
      shadow-xl    → велика тінь
      max-w-sm     → максимальна ширина
      w-full       → займає всю доступну ширину
      p-8          → внутрішні відступи
      text-center  → текст по центру
    -->
    <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-8 text-center">

      <!-- АВАТАР -->
      <!--
        w-24 h-24       → розмір 96px × 96px
        rounded-full    → кругла форма
        mx-auto mb-4    → по центру, відступ знизу
        object-cover    → зображення заповнює круг
      -->
      <img
        src="https://api.dicebear.com/7.x/adventurer/svg?seed=Karyna"
        alt="Karyna Opanasiuk"
        class="w-24 h-24 rounded-full mx-auto mb-4 object-cover bg-purple-100"
      />

      <!-- ІМ'Я -->
      <!-- text-2xl font-bold → великий жирний текст -->
      <h1 class="text-2xl font-bold text-gray-900 mb-1">Karyna Opanasiuk</h1>

      <!-- ПОСАДА -->
      <!-- text-purple-500 → фіолетовий колір -->
      <p class="text-purple-500 font-medium mb-4">UX/UI Designer</p>

      <!-- РОЗДІЛЮВАЧ -->
      <hr class="border-gray-200 mb-4" />

      <!-- ОПИС -->
      <p class="text-gray-500 text-sm leading-relaxed mb-6">
        Захоплена дизайнер інтерфейсів із фокусом на чистоті, зручності та деталях.
        Створюю продукти, якими приємно користуватись.
      </p>

      <!-- НАВИЧКИ — теги -->
      <!--
        flex flex-wrap gap-2 justify-center → теги в рядок, переносяться
        bg-purple-100 text-purple-700       → фіолетовий фон і текст
        rounded-full px-3 py-1 text-xs      → капсульна форма, дрібний текст
      -->
      <div class="flex flex-wrap gap-2 justify-center mb-6">
        <span class="bg-purple-100 text-purple-700 rounded-full px-3 py-1 text-xs font-medium">Figma</span>
        <span class="bg-purple-100 text-purple-700 rounded-full px-3 py-1 text-xs font-medium">UI/UX</span>
        <span class="bg-purple-100 text-purple-700 rounded-full px-3 py-1 text-xs font-medium">Prototyping</span>
        <span class="bg-purple-100 text-purple-700 rounded-full px-3 py-1 text-xs font-medium">Design Systems</span>
        <span class="bg-purple-100 text-purple-700 rounded-full px-3 py-1 text-xs font-medium">Tailwind CSS</span>
      </div>

      <!-- КНОПКА -->
      <!--
        w-full          → розтягується на всю ширину
        bg-purple-600   → фіолетовий фон
        hover:bg-purple-700 → темніший при наведенні
        text-white      → білий текст
        font-semibold   → напівжирний
        py-3 rounded-xl → відступи та заокруглення
        transition      → плавна анімація
      -->
      <a
        href="mailto:karynaopanasiuk@gmail.com"
        class="block w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition"
      >
        Написати мені ✉️
      </a>

    </div>
    <!-- КІНЕЦЬ КАРТКИ -->

  </body>
</html>
